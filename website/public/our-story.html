<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Story | Wild Wild</title>
  <link rel="icon" href="/favicon.png" type="image/png" sizes="any" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wild-red: #c41e2a;
      --wild-red-bright: #e83545;
      --burgundy: #1a080c;
      --burgundy-mid: #2a1018;
      --cream: #E6DFD3;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Sora", system-ui, sans-serif;
      background: var(--burgundy);
      color: var(--cream);
    }

    #leaves {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      cursor: crosshair;
    }

    .site-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem clamp(1.25rem, 4vw, 2.5rem);
      pointer-events: none;
    }

    .site-nav a {
      pointer-events: auto;
    }

    .nav-mark {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--cream);
      text-decoration: none;
    }

    .nav-mark span {
      color: var(--wild-red-bright);
    }

    .nav-links {
      display: flex;
      gap: 1.75rem;
      list-style: none;
    }

    .nav-links a {
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(246, 241, 232, 0.75);
      text-decoration: none;
    }

    .nav-links a:hover,
    .nav-links a[aria-current="page"] {
      color: var(--wild-red-bright);
    }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      pointer-events: none;
    }

    .overlay h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 24px rgba(0, 0, 0, 0.4);
    }

    .overlay p {
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(246, 241, 232, 0.55);
    }

    .overlay a {
      pointer-events: auto;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--wild-red-bright);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 53, 69, 0.5);
    }

    .overlay a:hover {
      color: var(--cream);
      border-color: var(--cream);
    }

    .glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background:
        radial-gradient(circle at 30% 40%, rgba(196, 30, 42, 0.15), transparent 45%),
        radial-gradient(circle at 70% 70%, rgba(120, 20, 35, 0.2), transparent 50%);
    }
  </style>
</head>
<body>
  <canvas id="leaves" aria-hidden="true"></canvas>
  <div class="glow" aria-hidden="true"></motion.div>

  <header class="site-nav">
    <a class="nav-mark" href="./index.html">Wild <span>Wild</span></a>
    <nav aria-label="Main">
      <ul class="nav-links">
        <li><a href="./our-story.html" aria-current="page">Our Story</a></li>
        <li><a href="#">Shop</a></li>
      </ul>
    </nav>
  </header>

  <div class="overlay">
    <h1>Our Story</h1>
    <p>Move to explore</p>
    <a href="./index.html">Back home</a>
  </div>

  <script>
    const canvas = document.getElementById("leaves");
    const ctx = canvas.getContext("2d");
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    const leaves = [];
    const leafCount = 100;
    const pointer = { x: window.innerWidth / 2, y: window.innerHeight / 2, active: false };

    function resizeCanvas() {
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function spawnLeaf() {
      return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 1.35,
        vy: (Math.random() - 0.5) * 1.35,
        size: 15 + Math.random() * 13,
        sway: Math.random() * Math.PI * 2,
        alpha: 0.38 + Math.random() * 0.34,
        speedLimit: 2.35 + Math.random() * 1.1,
        hue: 348 + Math.random() * 18,
        tilt: (Math.random() - 0.5) * 0.7,
        blade: 0.98 + Math.random() * 0.34
      };
    }

    function initFlock() {
      leaves.length = 0;
      for (let i = 0; i < leafCount; i += 1) {
        leaves.push(spawnLeaf());
      }
    }

    function drawLeaf(leaf) {
      const heading = Math.atan2(leaf.vy, leaf.vx);
      const sway = Math.sin(leaf.sway) * 0.2;
      const s = leaf.size;
      const wobble = sway * s * 0.04;
      const b = leaf.blade ?? 1;
      const halfW = s * 0.54 * b;
      const tipX = s * 0.9;
      const baseX = -s * 0.52;
      const cx = (baseX + tipX) * 0.5 - s * 0.02;
      const midY = wobble * 0.35;
      const h = leaf.hue;

      ctx.save();
      ctx.translate(leaf.x, leaf.y);
      ctx.rotate(heading + leaf.tilt + sway * 0.16);
      ctx.globalAlpha = leaf.alpha;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      ctx.beginPath();
      ctx.moveTo(baseX, 0);
      ctx.quadraticCurveTo(cx, -halfW + wobble, tipX, 0);
      ctx.quadraticCurveTo(cx, halfW - wobble, baseX, 0);
      ctx.closePath();

      const gx = baseX + (tipX - baseX) * 0.34;
      const rg = ctx.createRadialGradient(gx, -halfW * 0.22, s * 0.03, gx, midY, s * 0.88);
      rg.addColorStop(0, `hsla(${h + 4}, 72%, 58%, 1)`);
      rg.addColorStop(0.5, `hsla(${h}, 78%, 46%, 1)`);
      rg.addColorStop(1, `hsla(${h - 6}, 70%, 32%, 1)`);
      ctx.fillStyle = rg;
      ctx.fill();

      ctx.strokeStyle = `hsla(${h - 8}, 65%, 28%, 0.82)`;
      ctx.lineWidth = Math.max(0.85, s * 0.036);
      ctx.stroke();

      ctx.strokeStyle = `hsla(${h - 4}, 60%, 24%, 0.45)`;
      ctx.lineWidth = Math.max(0.45, s * 0.02);
      ctx.beginPath();
      ctx.moveTo(baseX + s * 0.1, midY);
      ctx.lineTo(tipX - s * 0.07, midY * 0.55);
      ctx.stroke();

      ctx.strokeStyle = `hsla(${h}, 55%, 35%, 0.32)`;
      ctx.lineWidth = Math.max(0.35, s * 0.016);
      const pairs = [
        { t: 0.4, reach: 0.58 },
        { t: 0.58, reach: 0.72 }
      ];
      for (let i = 0; i < pairs.length; i += 1) {
        const { t, reach } = pairs[i];
        const mx = baseX + (tipX - baseX) * t;
        const r = halfW * reach;
        ctx.beginPath();
        ctx.moveTo(mx, midY);
        ctx.quadraticCurveTo(mx + s * 0.09, -r * 0.32, mx + s * 0.2, -r);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(mx, midY);
        ctx.quadraticCurveTo(mx + s * 0.09, r * 0.32, mx + s * 0.2, r);
        ctx.stroke();
      }

      ctx.strokeStyle = `hsla(${h - 2}, 50%, 30%, 0.65)`;
      ctx.lineWidth = Math.max(0.38, s * 0.019);
      ctx.beginPath();
      ctx.moveTo(baseX, 0);
      ctx.lineTo(baseX - s * 0.09, s * 0.042);
      ctx.stroke();

      ctx.restore();
    }

    function tick() {
      ctx.fillStyle = "#1a080c";
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      for (let i = 0; i < leaves.length; i += 1) {
        const leaf = leaves[i];
        const dx = pointer.x - leaf.x;
        const dy = pointer.y - leaf.y;
        const dist = Math.hypot(dx, dy) || 1;

        const attraction = pointer.active ? 0.0088 : 0.0032;
        leaf.vx += (dx / dist) * attraction;
        leaf.vy += (dy / dist) * attraction;
        leaf.vx += (Math.random() - 0.5) * 0.011;
        leaf.vy += (Math.random() - 0.5) * 0.011;

        const speed = Math.hypot(leaf.vx, leaf.vy);
        if (speed > leaf.speedLimit) {
          leaf.vx = (leaf.vx / speed) * leaf.speedLimit;
          leaf.vy = (leaf.vy / speed) * leaf.speedLimit;
        }

        leaf.x += leaf.vx;
        leaf.y += leaf.vy;
        leaf.sway += 0.09 + speed * 0.14;

        const margin = Math.max(48, leaf.size * 2.8);
        if (leaf.x < -margin) leaf.x = window.innerWidth + margin;
        if (leaf.x > window.innerWidth + margin) leaf.x = -margin;
        if (leaf.y < -margin) leaf.y = window.innerHeight + margin;
        if (leaf.y > window.innerHeight + margin) leaf.y = -margin;

        drawLeaf(leaf);
      }

      requestAnimationFrame(tick);
    }

    function syncPointer(event) {
      pointer.x = event.clientX;
      pointer.y = event.clientY;
      pointer.active = true;
    }

    document.addEventListener("pointermove", syncPointer, { capture: true, passive: true });
    document.addEventListener("pointerdown", syncPointer, { capture: true, passive: true });
    document.addEventListener("pointerleave", () => {
      pointer.active = false;
    });

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    initFlock();
    tick();
  </script>
  <script src="/js/preview-session.js" defer></script>
  <script src="/js/site-footer.js" defer></script>
  <script src="/js/vercel-analytics.js" defer></script>
</body>
</html>
