<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wild Wild | Tracking animation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --canopy-900: #07130a;
      --canopy-700: #123520;
      --canopy-500: #246641;
      --mist: #b7e8cf;
      --cream: #f4f8ee;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: "Sora", system-ui, sans-serif;
      color: var(--cream);
      background:
        radial-gradient(circle at 15% 25%, rgba(36, 102, 65, 0.5), transparent 45%),
        radial-gradient(circle at 82% 85%, rgba(18, 53, 32, 0.6), transparent 48%),
        linear-gradient(130deg, var(--canopy-900) 0%, #0b2616 48%, var(--canopy-700) 100%);
    }

    .landing {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      isolation: isolate;
    }

    #birds {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: auto;
      cursor: crosshair;
    }

    .texture {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(92, 156, 104, 0.22), transparent 42%),
        radial-gradient(circle at 80% 70%, rgba(44, 95, 61, 0.26), transparent 44%),
        linear-gradient(rgba(4, 10, 6, 0.36), rgba(4, 10, 6, 0.5)),
        url("https://images.unsplash.com/photo-1511497584782-876760111969?auto=format&fit=crop&w=1800&q=80") center/cover no-repeat;
      mix-blend-mode: luminosity;
      opacity: 0.42;
      z-index: -1;
    }

    .jungle-glow {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 12% 80%, rgba(126, 190, 105, 0.15), transparent 35%),
        radial-gradient(circle at 88% 18%, rgba(71, 141, 95, 0.18), transparent 38%);
      z-index: 0;
    }

    .content {
      width: min(760px, 100%);
      text-align: center;
      padding: clamp(24px, 4vw, 44px);
      z-index: 1;
      /* Let pointer events reach the canvas for tracking; keep links/buttons clickable */
      pointer-events: none;
    }

    .content a,
    .content .btn {
      pointer-events: auto;
    }

    .brand-tagline {
      font-size: clamp(1.2rem, 2.8vw, 1.6rem);
      line-height: 1.35;
      margin-bottom: 1.1rem;
      font-weight: 600;
      color: #f4f8ee;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.28);
    }

    .subtitle {
      color: #e7f5ed;
      opacity: 0.96;
      font-size: clamp(1rem, 2.2vw, 1.14rem);
      line-height: 1.55;
      margin: 0 auto 1.25rem;
      max-width: 64ch;
    }

    .brand-logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 1rem;
    }

    .brand-logo {
      width: min(460px, 78vw);
      height: auto;
      display: block;
      mix-blend-mode: screen;
      filter: brightness(1.22) contrast(1.25) saturate(1.15) drop-shadow(0 14px 34px rgba(0, 0, 0, 0.3));
    }

    .zones {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .zone {
      border-radius: 999px;
      padding: 0.7rem 1.2rem;
      font-size: 0.92rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: 600;
      border: 1px solid rgba(244, 248, 238, 0.24);
      background: rgba(244, 248, 238, 0.12);
      color: #f4f8ee;
      backdrop-filter: blur(2px);
    }

    .actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: 0;
      border-radius: 999px;
      padding: 0.82rem 1.3rem;
      font-size: 0.94rem;
      font-weight: 600;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--canopy-500), #2b7b4f);
      color: var(--cream);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
    }

    .btn-ghost {
      background: rgba(244, 248, 238, 0.08);
      color: var(--cream);
      border: 1px solid rgba(244, 248, 238, 0.26);
    }
  </style>
</head>
<body>
  <section class="landing" aria-label="Wild Wild tracking landing page">
    <canvas id="birds" aria-hidden="true"></canvas>
    <div class="texture" aria-hidden="true"></div>
    <div class="jungle-glow" aria-hidden="true"></div>
    <div class="content">
      <div class="brand-logo-wrap">
        <img id="brandLogo" class="brand-logo" src="../Logo/Wild%20Wild%20Logo%20Transparent%20Background.png" alt="Wild Wild logo" />
      </div>
      <p class="brand-tagline">Wear the wild. Protect the wild.</p>
      <p class="subtitle">
        Drifting leaves follow your pointer. No images required — works on any static host or port.
      </p>
      <div class="zones" aria-label="Product zones">
        <span class="zone">Core Zone</span>
        <span class="zone">Wild Zone</span>
      </div>
      <div class="actions">
        <a class="btn btn-primary" href="#">Shop Now</a>
        <a class="btn btn-ghost" href="#">View Impact</a>
      </div>
    </div>
  </section>

  <script>
    const logoImage = document.getElementById("brandLogo");

    function knockOutWhiteBackground(img) {
      try {
        const c = document.createElement("canvas");
        const cx = c.getContext("2d", { willReadFrequently: true });
        c.width = img.naturalWidth;
        c.height = img.naturalHeight;
        cx.drawImage(img, 0, 0);

        const frame = cx.getImageData(0, 0, c.width, c.height);
        const px = frame.data;

        for (let i = 0; i < px.length; i += 4) {
          const r = px[i];
          const g = px[i + 1];
          const b = px[i + 2];
          const max = Math.max(r, g, b);
          const min = Math.min(r, g, b);
          const sat = max === 0 ? 0 : (max - min) / max;
          const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;

          if (luminance > 192 && sat < 0.24) {
            px[i + 3] = 0;
          }
        }

        cx.putImageData(frame, 0, 0);
        img.src = c.toDataURL("image/png");
      } catch (err) {
        // Keep original logo if processing is blocked.
      }
    }

    if (logoImage) {
      if (logoImage.complete) {
        knockOutWhiteBackground(logoImage);
      } else {
        logoImage.addEventListener("load", () => knockOutWhiteBackground(logoImage), { once: true });
      }
    }

    const canvas = document.getElementById("birds");
    const ctx = canvas && canvas.getContext("2d");
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    const leaves = [];
    const leafCount = 100;
    const pointer = { x: window.innerWidth / 2, y: window.innerHeight / 2, active: false };

    function resizeCanvas() {
      if (!canvas || !ctx) return;
      canvas.width = Math.floor(window.innerWidth * dpr);
      canvas.height = Math.floor(window.innerHeight * dpr);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function spawnLeaf() {
      return {
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        vx: (Math.random() - 0.5) * 1.35,
        vy: (Math.random() - 0.5) * 1.35,
        size: 15 + Math.random() * 13,
        sway: Math.random() * Math.PI * 2,
        alpha: 0.34 + Math.random() * 0.32,
        speedLimit: 2.35 + Math.random() * 1.1,
        hue: 95 + Math.random() * 35,
        tilt: (Math.random() - 0.5) * 0.7,
        blade: 0.98 + Math.random() * 0.34
      };
    }

    function initFlock() {
      leaves.length = 0;
      for (let i = 0; i < leafCount; i += 1) {
        leaves.push(spawnLeaf());
      }
    }

    function drawLeaf(leaf) {
      const heading = Math.atan2(leaf.vy, leaf.vx);
      const sway = Math.sin(leaf.sway) * 0.2;
      const s = leaf.size;
      const wobble = sway * s * 0.04;
      const b = leaf.blade ?? 1;
      const halfW = s * 0.54 * b;
      const tipX = s * 0.9;
      const baseX = -s * 0.52;
      const cx = (baseX + tipX) * 0.5 - s * 0.02;
      const midY = wobble * 0.35;

      ctx.save();
      ctx.translate(leaf.x, leaf.y);
      ctx.rotate(heading + leaf.tilt + sway * 0.16);
      ctx.globalAlpha = leaf.alpha;
      ctx.shadowBlur = 0;
      ctx.shadowColor = "transparent";
      ctx.lineJoin = "round";
      ctx.lineCap = "round";

      ctx.beginPath();
      ctx.moveTo(baseX, 0);
      ctx.quadraticCurveTo(cx, -halfW + wobble, tipX, 0);
      ctx.quadraticCurveTo(cx, halfW - wobble, baseX, 0);
      ctx.closePath();

      const gx = baseX + (tipX - baseX) * 0.34;
      const rg = ctx.createRadialGradient(gx, -halfW * 0.22, s * 0.03, gx, midY, s * 0.88);
      rg.addColorStop(0, `hsla(${leaf.hue + 10}, 58%, 56%, 1)`);
      rg.addColorStop(0.5, `hsla(${leaf.hue}, 56%, 44%, 1)`);
      rg.addColorStop(1, `hsla(${leaf.hue - 12}, 48%, 26%, 1)`);
      ctx.fillStyle = rg;
      ctx.fill();

      ctx.strokeStyle = `hsla(${leaf.hue - 10}, 48%, 22%, 0.78)`;
      ctx.lineWidth = Math.max(0.85, s * 0.036);
      ctx.stroke();

      ctx.strokeStyle = `hsla(${leaf.hue - 16}, 40%, 22%, 0.4)`;
      ctx.lineWidth = Math.max(0.45, s * 0.02);
      ctx.beginPath();
      ctx.moveTo(baseX + s * 0.1, midY);
      ctx.lineTo(tipX - s * 0.07, midY * 0.55);
      ctx.stroke();

      ctx.strokeStyle = `hsla(${leaf.hue - 6}, 38%, 30%, 0.28)`;
      ctx.lineWidth = Math.max(0.35, s * 0.016);
      const pairs = [
        { t: 0.4, reach: 0.58 },
        { t: 0.58, reach: 0.72 }
      ];
      for (let i = 0; i < pairs.length; i += 1) {
        const { t, reach } = pairs[i];
        const mx = baseX + (tipX - baseX) * t;
        const r = halfW * reach;
        ctx.beginPath();
        ctx.moveTo(mx, midY);
        ctx.quadraticCurveTo(mx + s * 0.09, -r * 0.32, mx + s * 0.2, -r);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(mx, midY);
        ctx.quadraticCurveTo(mx + s * 0.09, r * 0.32, mx + s * 0.2, r);
        ctx.stroke();
      }

      ctx.strokeStyle = `hsla(${leaf.hue - 8}, 36%, 28%, 0.62)`;
      ctx.lineWidth = Math.max(0.38, s * 0.019);
      ctx.beginPath();
      ctx.moveTo(baseX, 0);
      ctx.lineTo(baseX - s * 0.09, s * 0.042);
      ctx.stroke();

      ctx.restore();
    }

    function tick() {
      if (!ctx) return;
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (let i = 0; i < leaves.length; i += 1) {
        const leaf = leaves[i];
        const dx = pointer.x - leaf.x;
        const dy = pointer.y - leaf.y;
        const dist = Math.hypot(dx, dy) || 1;

        const attraction = pointer.active ? 0.0088 : 0.0032;
        leaf.vx += (dx / dist) * attraction;
        leaf.vy += (dy / dist) * attraction;

        leaf.vx += (Math.random() - 0.5) * 0.011;
        leaf.vy += (Math.random() - 0.5) * 0.011;

        const speed = Math.hypot(leaf.vx, leaf.vy);
        if (speed > leaf.speedLimit) {
          leaf.vx = (leaf.vx / speed) * leaf.speedLimit;
          leaf.vy = (leaf.vy / speed) * leaf.speedLimit;
        }

        leaf.x += leaf.vx;
        leaf.y += leaf.vy;
        leaf.sway += 0.09 + speed * 0.14;

        const margin = Math.max(48, leaf.size * 2.8);
        if (leaf.x < -margin) leaf.x = window.innerWidth + margin;
        if (leaf.x > window.innerWidth + margin) leaf.x = -margin;
        if (leaf.y < -margin) leaf.y = window.innerHeight + margin;
        if (leaf.y > window.innerHeight + margin) leaf.y = -margin;

        drawLeaf(leaf);
      }

      requestAnimationFrame(tick);
    }

    function syncPointer(event) {
      pointer.x = event.clientX;
      pointer.y = event.clientY;
      pointer.active = true;
    }

    document.addEventListener("pointermove", syncPointer, { capture: true, passive: true });
    document.addEventListener("pointerdown", syncPointer, { capture: true, passive: true });
    document.addEventListener("pointerleave", () => {
      pointer.active = false;
    });
    document.addEventListener("pointercancel", () => {
      pointer.active = false;
    });

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    initFlock();
    tick();
  </script>
</body>
</html>
