<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antigravity Birds</title>
  <style>
    :root {
      --bg-0: #04070d;
      --bg-1: #0b1220;
      --bg-2: #131e32;
      --text: #e7eefc;
      --muted: #9fb3d6;
      --card: rgba(13, 22, 38, 0.56);
      --border: rgba(146, 180, 238, 0.22);
      --glow: rgba(102, 182, 255, 0.24);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 30% 20%, #1d3358 0%, transparent 45%),
                  radial-gradient(circle at 78% 82%, #152742 0%, transparent 40%),
                  linear-gradient(140deg, var(--bg-0), var(--bg-1), var(--bg-2));
      font-family: Inter, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    #sky {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      padding: 24px;
    }

    .card {
      width: min(680px, 100%);
      border: 1px solid var(--border);
      background: var(--card);
      backdrop-filter: blur(18px) saturate(140%);
      border-radius: 22px;
      box-shadow: 0 20px 80px var(--glow);
      padding: clamp(22px, 4vw, 40px);
      text-align: center;
    }

    .badge {
      display: inline-block;
      margin-bottom: 12px;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    h1 {
      font-size: clamp(2rem, 6vw, 3.45rem);
      line-height: 1.04;
      letter-spacing: -0.02em;
      margin-bottom: 10px;
    }

    p {
      font-size: clamp(1rem, 2.2vw, 1.18rem);
      color: #c4d6f4;
      line-height: 1.5;
      margin-inline: auto;
      max-width: 44ch;
    }
  </style>
</head>
<body>
  <canvas id="sky" aria-hidden="true"></canvas>
  <main class="overlay">
    <section class="card" role="status" aria-live="polite">
      <span class="badge">Antigravity</span>
      <h1>Authentication successful</h1>
      <p>Move your cursor and watch the flock follow your path.</p>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("sky");
    const ctx = canvas.getContext("2d");

    const DPR = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    const birds = [];
    const BIRD_COUNT = 55;
    const mouse = { x: window.innerWidth * 0.5, y: window.innerHeight * 0.5, active: false };

    function resize() {
      canvas.width = Math.floor(window.innerWidth * DPR);
      canvas.height = Math.floor(window.innerHeight * DPR);
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }

    function createBird() {
      const x = Math.random() * window.innerWidth;
      const y = Math.random() * window.innerHeight;
      const hue = 190 + Math.random() * 80;
      return {
        x,
        y,
        vx: (Math.random() - 0.5) * 1.8,
        vy: (Math.random() - 0.5) * 1.8,
        size: 7 + Math.random() * 7,
        speedCap: 2.8 + Math.random() * 1.4,
        turnEase: 0.06 + Math.random() * 0.06,
        flap: Math.random() * Math.PI * 2,
        hue,
        alpha: 0.45 + Math.random() * 0.45
      };
    }

    function init() {
      birds.length = 0;
      for (let i = 0; i < BIRD_COUNT; i += 1) {
        birds.push(createBird());
      }
    }

    function drawBird(b) {
      const angle = Math.atan2(b.vy, b.vx);
      const wing = Math.sin(b.flap) * 0.9;

      ctx.save();
      ctx.translate(b.x, b.y);
      ctx.rotate(angle);
      ctx.globalAlpha = b.alpha;
      ctx.strokeStyle = `hsla(${b.hue}, 90%, 75%, 1)`;
      ctx.lineWidth = Math.max(1.1, b.size * 0.17);
      ctx.lineCap = "round";
      ctx.shadowBlur = 10;
      ctx.shadowColor = `hsla(${b.hue}, 100%, 65%, 0.45)`;

      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(-b.size * 0.44, -b.size * (0.62 + wing * 0.35), -b.size * 0.95, -b.size * 0.1);
      ctx.moveTo(0, 0);
      ctx.quadraticCurveTo(-b.size * 0.44, b.size * (0.62 + wing * 0.35), -b.size * 0.95, b.size * 0.1);
      ctx.stroke();

      ctx.restore();
    }

    function step() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      for (let i = 0; i < birds.length; i += 1) {
        const b = birds[i];
        const targetX = mouse.x;
        const targetY = mouse.y;
        const dx = targetX - b.x;
        const dy = targetY - b.y;
        const dist = Math.hypot(dx, dy) || 1;

        const pull = mouse.active ? 0.05 : 0.015;
        b.vx += (dx / dist) * pull * 2.2;
        b.vy += (dy / dist) * pull * 2.2;

        b.vx += (Math.random() - 0.5) * 0.07;
        b.vy += (Math.random() - 0.5) * 0.07;

        const speed = Math.hypot(b.vx, b.vy);
        if (speed > b.speedCap) {
          b.vx = (b.vx / speed) * b.speedCap;
          b.vy = (b.vy / speed) * b.speedCap;
        }

        b.x += b.vx;
        b.y += b.vy;
        b.flap += 0.22 + speed * 0.09;

        if (b.x < -30) b.x = window.innerWidth + 30;
        if (b.x > window.innerWidth + 30) b.x = -30;
        if (b.y < -30) b.y = window.innerHeight + 30;
        if (b.y > window.innerHeight + 30) b.y = -30;

        drawBird(b);
      }

      requestAnimationFrame(step);
    }

    window.addEventListener("pointermove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });

    window.addEventListener("pointerdown", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });

    window.addEventListener("blur", () => { mouse.active = false; });
    window.addEventListener("mouseleave", () => { mouse.active = false; });
    window.addEventListener("resize", resize);

    resize();
    init();
    step();
  </script>
</body>
</html>
